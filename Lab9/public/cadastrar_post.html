<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <title>Cadastrar post</title>
    <link href="style.css" rel="stylesheet">
</head>
<body id="pagina_create">
    
    <div id="cadastrar">
    <h1>Formulário de criação de posts</h1>
    <form action="/cadastrar_postagem" method="post">
        <p>Titulo: <br><input type="text" name="titulo"></p>
        <p>Resumo: <br><input type="text" name="resumo"></p>
        <p>Conteúdo: <br><input type="text" name="conteudo"></p>
        <input type="submit" value="Enviar">
    </form>
    </div>

</body>
</html>
